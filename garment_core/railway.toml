# Docker imajı: Tailwind + collectstatic (development settings) Dockerfile içinde.
# Ortam: DJANGO_SETTINGS_MODULE=config.settings.production, SECRET_KEY, CSRF_TRUSTED_ORIGINS, DATABASE_URL, …

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Her deploy öncesi bir kez (çoklu replikada konteyner başına tekrar etmez)
preDeployCommand = "python manage.py migrate --noinput && python manage.py shell -c \"from django.contrib.auth import get_user_model; U=get_user_model(); U.objects.filter(username='admin').exists() or U.objects.create_superuser('admin', 'admin@erdeniztech.com', 'Garm2026!Erdeniz')\""
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
