{% extends 'base.html' %}

{% block title %}Profil Düzenle — Garment Core{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-12">
  <h1 class="text-2xl font-medium mb-6" style="color: #f5f0e8;">
    Profil Düzenle
  </h1>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="px-4 py-2 rounded-lg" style="background: #c9a84c; color: #0a0a0a;">
      Kaydet
    </button>
  </form>
</div>
{% endblock %}
