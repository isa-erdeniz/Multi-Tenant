# database_id: Cloudflare Dashboard > Storage & Databases > D1 > dressifye-db > Database ID
# database_id yanlışsa Cloudflare D1 sayfasından doğru UUID ile güncelle.

name = "dressifye"
main = "index.js"
compatibility_date = "2026-04-08"

[[d1_databases]]
binding = "DB"
database_name = "dressifye-db"
database_id = "193a55ca-7006-41be-89b3-3b2e1c165f4a"

[assets]
directory = "./"
binding = "ASSETS"

# Cloudflare Dashboard → Workers & Pages → dressifye → Settings → Variables
# Aşağıdaki değerleri Cloudflare panelinde environment variable olarak set edin.
[vars]
# Django garment_core (Railway) — abonelik init, callback ve auth proxy için
GARMENT_CORE_API_URL = ""   # Railway'de: https://<garment-core-django>.railway.app

# packages/garment_core TypeScript API (Railway) — garment listesi için
GARMENT_CORE_TS_URL = ""    # Railway'de: https://<garment-core-ts>.railway.app
GARMENT_CORE_TS_API_KEY = ""  # npm run db:create-api-key çıktısı
