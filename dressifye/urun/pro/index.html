<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="stylesheet" href="/css/site-background.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Plan — Dressifye</title>
    <meta name="description" content="Dressifye Pro: sınırsız deneme, gelişmiş AI önerileri ve öncelikli destek.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        secondary: '#F7931E',
                        dark: '#0A0A0A',
                        gray: { 850: '#1F1F1F', 900: '#121212' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .glass-effect { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text {
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
    <script src="/js/cart.js" defer></script>
    <script src="/js/landing-pricing.js" defer></script>
</head>
<body class="bg-dark text-white font-sans antialiased min-h-screen pt-20 pb-12">
    <nav class="fixed w-full z-50 glass-effect border-b border-white/10 top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    </div>
                    <span class="text-2xl font-bold">Dressifye</span>
                </a>
                <div class="flex items-center gap-4">
                    <a href="/#pricing" class="text-gray-300 hover:text-primary text-sm hidden sm:inline">Tüm planlar</a>
                    <a href="/sepet/" class="relative p-2 rounded-lg hover:bg-white/5 transition" aria-label="Sepet">
                        <span class="text-2xl">🛒</span>
                        <span data-cart-badge class="absolute -top-0.5 -right-0.5 min-w-[1.25rem] h-5 px-1 flex items-center justify-center rounded-full bg-primary text-white text-xs font-bold hidden">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <article class="max-w-3xl mx-auto px-4">
        <nav class="text-sm text-gray-500 mb-6"><a href="/" class="hover:text-primary">Ana sayfa</a> <span class="mx-2">/</span> <span class="text-gray-300">Pro Plan</span></nav>
        <h1 class="text-4xl font-bold mb-2">Pro <span class="gradient-text">Abonelik</span></h1>
        <p class="text-3xl font-bold mb-6"><span id="pro-product-price">₺99</span><span class="text-lg text-gray-400 font-normal">/ay</span></p>
        <div class="glass-effect rounded-2xl p-8 mb-8">
            <h2 class="text-lg font-semibold mb-4">Öne çıkanlar</h2>
            <ul class="space-y-3 text-gray-300">
                <li class="flex gap-3"><span class="text-primary">✓</span> Sınırsız sanal deneme</li>
                <li class="flex gap-3"><span class="text-primary">✓</span> Gelişmiş AI stil önerileri</li>
                <li class="flex gap-3"><span class="text-primary">✓</span> Öncelikli e-posta desteği</li>
            </ul>
        </div>
        <p class="text-gray-400 mb-8">Dijital hizmet aboneliği; fatura ve sözleşme koşulları için <a href="/legal/mesafeli-satis/" class="text-primary hover:underline">Mesafeli Satış</a> sayfasına bakın.</p>
        <div class="flex flex-col sm:flex-row gap-4">
            <button type="button" id="btn-cart-platinum-pro" onclick="addToCart('platinum-plan', 899)" class="w-full sm:w-auto px-8 py-4 rounded-full bg-primary hover:bg-secondary text-white font-semibold transition">Sepete Ekle</button>
            <a href="/sepet/" class="w-full sm:w-auto text-center px-8 py-4 rounded-full border border-white/20 hover:border-primary font-medium transition">Sepeti görüntüle</a>
        </div>
    </article>
</body>
</html>
