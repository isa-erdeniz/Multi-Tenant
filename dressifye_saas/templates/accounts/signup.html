{% extends "base.html" %}
{% block title %}Kayıt Ol - Dressifye{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-brand-black mb-6">Kayıt Ol</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full py-2 px-4 bg-brand-gold text-black font-semibold rounded-lg hover:opacity-90">
            Kayıt Ol
        </button>
    </form>
    <p class="mt-4 text-sm">
        Zaten hesabınız var mı? <a href="{% url 'account_login' %}" class="text-brand-gold hover:underline">Giriş yapın</a>
    </p>
</div>
{% endblock %}
