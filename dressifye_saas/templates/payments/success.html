{% extends "base.html" %}
{% block title %}Ödeme Başarılı — Dressifye{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-6"
     style="background: #0a0a0a;">
  <div class="text-center max-w-md">

    <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"
         style="background: rgba(201,168,76,0.15); border: 2px solid #c9a84c;">
      <span class="text-3xl">✓</span>
    </div>

    <h1 class="text-2xl font-serif italic mb-3" style="color: #f5f0e8;">
      Aboneliğiniz Aktif!
    </h1>

    {% if subscription %}
    <p class="text-sm mb-2" style="color: #888;">
      {{ subscription.plan.name }} planı
    </p>
    <p class="text-xs mb-8" style="color: #555;">
      {{ subscription.end_date|date:"d M Y" }} tarihine kadar geçerli
    </p>
    {% endif %}

    <a href="{% url 'core:dashboard' %}"
       class="inline-block px-8 py-3 rounded-xl font-medium text-sm"
       style="background: #c9a84c; color: #0a0a0a;">
      Dashboard'a Git →
    </a>

  </div>
</div>
{% endblock %}
