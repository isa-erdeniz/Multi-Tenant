{% load static %}
<nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
     :class="scrolled ? 'bg-[#0a0a0a]/90 backdrop-blur-md border-b border-[#1a1a1a]' : 'bg-transparent'"
     x-data="{ mobileMenuOpen: false, scrolled: false }"
     x-init="window.addEventListener('scroll', () => scrolled = window.scrollY > 50)">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16 md:h-20">
            <a href="{% url 'core:landing' %}" class="text-2xl font-display italic text-brand-gold z-10">garment core</a>
            <div class="hidden md:flex items-center gap-8">
                <a href="#demo" class="text-sm text-[#f5f0e8] hover:text-brand-gold transition">Özellikler</a>
                <a href="#kanit" class="text-sm text-[#f5f0e8] hover:text-brand-gold transition">Kullanıcılar</a>
                <a href="#fiyatlar" class="text-sm text-[#f5f0e8] hover:text-brand-gold transition">Fiyatlar</a>
                {% if user.is_authenticated %}
                <a href="{% url 'core:dashboard' %}" class="text-sm text-[#f5f0e8] hover:text-brand-gold transition">Dashboard</a>
                <a href="{% url 'payments:upgrade' %}" class="px-4 py-2 rounded-lg text-sm font-medium text-[#0a0a0a] bg-brand-gold hover:opacity-90 transition">Premium</a>
                <a href="{% url 'account_logout' %}" class="text-sm text-[#888] hover:text-[#f5f0e8]">Çıkış</a>
                {% else %}
                <a href="{% url 'account_login' %}" class="text-sm text-[#f5f0e8] hover:text-brand-gold transition">Giriş</a>
                <a href="{% url 'account_signup' %}" class="px-4 py-2 rounded-lg text-sm font-medium text-[#0a0a0a] bg-brand-gold hover:opacity-90 transition">Ücretsiz Başla</a>
                {% endif %}
            </div>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 z-10" aria-label="Menü">
                <svg class="w-6 h-6 text-[#f5f0e8]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path x-show="!mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    <path x-show="mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div x-show="mobileMenuOpen" x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
             class="md:hidden absolute inset-x-0 top-16 py-4 px-4 bg-[#0a0a0a] border-b border-[#1a1a1a] space-y-2">
            <a href="#demo" class="block py-2 text-[#f5f0e8]" @click="mobileMenuOpen = false">Özellikler</a>
            <a href="#kanit" class="block py-2 text-[#f5f0e8]" @click="mobileMenuOpen = false">Kullanıcılar</a>
            <a href="#fiyatlar" class="block py-2 text-[#f5f0e8]" @click="mobileMenuOpen = false">Fiyatlar</a>
            {% if user.is_authenticated %}
            <a href="{% url 'core:dashboard' %}" class="block py-2 text-brand-gold" @click="mobileMenuOpen = false">Dashboard</a>
            <a href="{% url 'payments:upgrade' %}" class="block py-2 text-brand-gold" @click="mobileMenuOpen = false">Premium</a>
            {% else %}
            <a href="{% url 'account_login' %}" class="block py-2 text-[#f5f0e8]" @click="mobileMenuOpen = false">Giriş</a>
            <a href="{% url 'account_signup' %}" class="block py-2 text-brand-gold font-medium" @click="mobileMenuOpen = false">Ücretsiz Başla</a>
            {% endif %}
        </div>
    </div>
</nav>
